[versions]
gson = "2.11.0"
okhttp3 = "4.12.0"
jetbrains-annotations = "24.1.0"
lombok = "1.18.34"
junit5 = "5.11.3"

[libraries]
com-google-code-gson-gson = { module = "com.google.code.gson:gson", version.ref = "gson" }
com-squareup-okhttp3-logging-interceptor = { module = "com.squareup.okhttp3:logging-interceptor", version.ref = "okhttp3" }
com-squareup-okhttp3-okhttp = { module = "com.squareup.okhttp3:okhttp", version.ref = "okhttp3" }
org-jetbrains-annotations = { module = "org.jetbrains:annotations", version.ref = "jetbrains-annotations" }
org-junit-jupiter-junit-jupiter-api = { module = "org.junit.jupiter:junit-jupiter-api", version.ref = "junit5" }
org-junit-jupiter-junit-jupiter-engine = { module = "org.junit.jupiter:junit-jupiter-engine", version.ref = "junit5" }
org-projectlombok-lombok = { module = "org.projectlombok:lombok", version.ref = "lombok" }
